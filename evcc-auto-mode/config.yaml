name: evcc Auto Mode
version: "0.3.3"
slug: evcc_auto_mode
description: Automatically switch evcc between pv and minpv via MQTT.
url: "https://github.com/BigT1993-dot/ha-addon/tree/main/evcc-auto-mode"
ingress: true
ingress_port: 8099
homeassistant_api: true
hassio_api: true
hassio_role: homeassistant
panel_icon: mdi:car-electric
panel_title: evcc Auto Mode
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
startup: services
boot: auto
options:
  mqtt_host: core-mosquitto
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_topic_prefix: evcc
  loadpoint_id: 1
  homeassistant_power_sensor_entity_id: ""
  homeassistant_battery_power_sensor_entity_id: ""
  homeassistant_vehicle_soc_sensor_entity_id: ""
  export_power_threshold_w: -100
  import_power_threshold_w: 100
  export_delay_seconds: 60
  import_delay_seconds: 30
  battery_discharge_power_threshold_w: 200
  battery_discharge_delay_seconds: 60
  evcc_active_current_threshold: 6.0
  max_pv_mode_enabled: false
  max_pv_inverter_input_power_sensor_entity_id: ""
  max_pv_inverter_power_w: 8500
  max_pv_battery_discharge_power_w: 4900
  max_pv_min_battery_soc: 85
  max_pv_min_current_a: 6
  max_pv_max_current_a: 16
  max_pv_phases: 3
  max_pv_control_interval_seconds: 10
  max_pv_adjustment_hold_seconds: 30
  auto_reset_on_restart: true
schema:
  mqtt_host: str
  mqtt_port: port
  mqtt_username: str?
  mqtt_password: password?
  mqtt_topic_prefix: str
  loadpoint_id: int(1,)
  homeassistant_power_sensor_entity_id: str?
  homeassistant_battery_power_sensor_entity_id: str?
  homeassistant_vehicle_soc_sensor_entity_id: str?
  export_power_threshold_w: float
  import_power_threshold_w: float
  export_delay_seconds: int(1,)
  import_delay_seconds: int(1,)
  battery_discharge_power_threshold_w: float
  battery_discharge_delay_seconds: int(1,)
  evcc_active_current_threshold: float(0,)
  max_pv_mode_enabled: bool
  max_pv_inverter_input_power_sensor_entity_id: str?
  max_pv_inverter_power_w: float(0.000001,)
  max_pv_battery_discharge_power_w: float(0.000001,)
  max_pv_min_battery_soc: int(0,100)
  max_pv_min_current_a: int(1,)
  max_pv_max_current_a: int(1,)
  max_pv_phases: int(1,3)
  max_pv_control_interval_seconds: int(1,)
  max_pv_adjustment_hold_seconds: int(1,)
  auto_reset_on_restart: bool
